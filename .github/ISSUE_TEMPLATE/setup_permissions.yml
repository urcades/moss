name: Setup Or Permissions Help
description: Get help with install, permissions, Doctor, or LaunchAgents.
title: "[Setup]: "
labels: ["setup"]
body:
  - type: textarea
    id: issue
    attributes:
      label: What is blocked?
      description: Describe the setup or permission step that is not working.
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Doctor Output
      description: Paste `swift run codexmsgctl-swift doctor` output.
      render: text
    validations:
      required: true
  - type: textarea
    id: status
    attributes:
      label: Status Output
      description: Paste `swift run codexmsgctl-swift status` output.
      render: text
  - type: checkboxes
    id: permissions
    attributes:
      label: Permissions Checked
      options:
        - label: Full Disk Access
        - label: Messages Automation
        - label: Accessibility
        - label: Screen Recording
        - label: Computer Use Automation
